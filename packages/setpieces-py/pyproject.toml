[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "setpieces"
version = "0.1.0"
description = "Extract and analyze football set-piece events (corners, free kicks, throw-ins, penalties) from Opta-format event data"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Marc Lamberts" }]
requires-python = ">=3.9"
dependencies = []
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering",
]

[project.optional-dependencies]
plot = ["matplotlib>=3.5"]
dev = ["pytest>=7"]

[project.urls]
Homepage = "https://github.com/marclamberts/ecuador-2026-analytics/tree/main/packages/setpieces-py"

[tool.setuptools.packages.find]
where = ["src"]
